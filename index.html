<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuroFlow - AI Study Planner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            text-align: center;
            color: #4f46e5;
            margin-bottom: 10px;
            font-size: 2.5rem;
        }
        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #4f46e5;
        }
        button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(79, 70, 229, 0.4);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #e5e7eb;
            border-top-color: #4f46e5;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .results {
            display: none;
            margin-top: 30px;
        }
        .metrics {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .metric-card {
            background: #f3f4f6;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .metric-value {
            font-size: 2rem;
            font-weight: bold;
            color: #4f46e5;
        }
        .metric-label {
            color: #6b7280;
            font-size: 0.875rem;
        }
        .schedule {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
        }
        .schedule-item {
            display: flex;
            padding: 12px;
            border-bottom: 1px solid #e5e7eb;
        }
        .schedule-item:last-child {
            border-bottom: none;
        }
        .time {
            width: 100px;
            font-weight: 600;
            color: #4f46e5;
        }
        .subject {
            flex: 1;
        }
        .break {
            background: #f3f4f6;
        }
        .deep-work {
            background: #fef3c7;
            border-left: 4px solid #f59e0b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 NeuroFlow</h1>
        <p class="subtitle">AI-Powered Study Planner</p>
        
        <form id="plannerForm">
            <div class="form-group">
                <label for="subjects">Subjects (comma-separated)</label>
                <input type="text" id="subjects" placeholder="Math, Physics, Chemistry" required>
            </div>
            
            <div class="form-group">
                <label for="examDate">Exam Date</label>
                <input type="date" id="examDate" required>
            </div>
            
            <div class="form-group">
                <label for="dailyHours">Daily Study Hours</label>
                <input type="number" id="dailyHours" min="1" max="12" value="6" step="0.5" required>
            </div>
            
            <div class="form-group">
                <label for="energyPattern">Energy Pattern</label>
                <select id="energyPattern">
                    <option value="morning_high">Morning High (6AM-12PM)</option>
                    <option value="afternoon_high">Afternoon High (12PM-6PM)</option>
                    <option value="night_high">Night Owl (8PM-2AM)</option>
                    <option value="bimodal">Bimodal (Morning + Evening)</option>
                </select>
            </div>
            
            <button type="submit" id="generateBtn">🚀 Generate Study Plan</button>
        </form>
        
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Generating your personalized schedule...</p>
        </div>
        
        <div class="results" id="results">
            <div class="metrics">
                <div class="metric-card">
                    <div class="metric-value" id="productivityScore">--</div>
                    <div class="metric-label">Productivity Score</div>
                </div>
                <div class="metric-card">
                    <div class="metric-value" id="burnoutRisk">--%</div>
                    <div class="metric-label">Burnout Risk</div>
                </div>
            </div>
            <h3 style="margin-bottom: 15px; color: #4f46e5;">📅 Your Schedule</h3>
            <div class="schedule" id="schedule"></div>
        </div>
    </div>

    <script>
        const ENERGY_PATTERNS = {
            morning_high: { peak: [6, 7, 8, 9, 10, 11] },
            afternoon_high: { peak: [12, 13, 14, 15, 16, 17] },
            night_high: { peak: [20, 21, 22, 23, 0, 1] },
            bimodal: { peak: [7, 8, 9, 19, 20, 21] }
        };

        document.getElementById('plannerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            generateSchedule();
        });

        function generateSchedule() {
            const subjects = document.getElementById('subjects').value;
            const examDate = document.getElementById('examDate').value;
            const dailyHours = parseFloat(document.getElementById('dailyHours').value);
            const energyPattern = document.getElementById('energyPattern').value;

            // Show loading
            document.getElementById('loading').style.display = 'block';
            document.getElementById('results').style.display = 'none';
            document.getElementById('generateBtn').disabled = true;

            // Simulate processing
            setTimeout(() => {
                const schedule = createSchedule(subjects, dailyHours, energyPattern);
                displayResults(schedule);
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('results').style.display = 'block';
                document.getElementById('generateBtn').disabled = false;
            }, 1500);
        }

        function createSchedule(subjects, dailyHours, energyPattern) {
            const subjectsList = subjects.split(',').map(s => s.trim()).filter(s => s);
            if (subjectsList.length === 0) subjectsList = ['Study'];

            const energy = ENERGY_PATTERNS[energyPattern];
            const peakHours = energy.peak.slice(0, 3);

            let startHour;
            if (energyPattern === 'morning_high') startHour = 8;
            else if (energyPattern === 'afternoon_high') startHour = 12;
            else if (energyPattern === 'night_high') startHour = 20;
            else startHour = 9;

            const schedule = [];
            let currentHour = startHour;
            const totalMinutes = dailyHours * 60;
            let elapsed = 0;
            let sessionNum = 0;

            while (elapsed < totalMinutes) {
                const workDuration = peakHours.includes(currentHour) ? 90 : 50;
                const actualWork = Math.min(workDuration, totalMinutes - elapsed);
                
                const subject = subjectsList[sessionNum % subjectsList.length];
                const endHour = currentHour + Math.floor(actualWork / 60);
                const endMin = actualWork % 60;
                const timeStr = `${String(currentHour).padStart(2, '0')}:00-${String(endHour).padStart(2, '0')}:${String(endMin).padStart(2, '0')}`;

                schedule.push({
                    time: timeStr,
                    subject: subject,
                    type: peakHours.includes(currentHour) ? 'deep-work' : 'study',
                    duration: actualWork
                });

                elapsed += actualWork;
                currentHour = endHour;
                sessionNum++;

                if (elapsed < totalMinutes) {
                    const breakDuration = sessionNum % 4 === 0 ? 15 : 10;
                    const actualBreak = Math.min(breakDuration, totalMinutes - elapsed);
                    const breakEndHour = currentHour + Math.floor(actualBreak / 60);
                    const breakEndMin = actualBreak % 60;

                    schedule.push({
                        time: `${String(currentHour).padStart(2, '0')}:00-${String(breakEndHour).padStart(2, '0')}:${String(breakEndMin).padStart(2, '0')}`,
                        subject: 'Break',
                        type: 'break',
                        duration: actualBreak
                    });

                    elapsed += actualBreak;
                    currentHour = breakEndHour;
                }
            }

            const burnout = Math.min(100, Math.floor((dailyHours / 10) * 40 + subjectsList.length * 5));
            const productivity = Math.max(40, Math.min(95, Math.floor(100 - burnout * 0.5 + dailyHours * 2)));

            return { schedule, burnout, productivity };
        }

        function displayResults(data) {
            document.getElementById('productivityScore').textContent = data.productivity;
            document.getElementById('burnoutRisk').textContent = data.burnout + '%';
            
            const scheduleHtml = data.schedule.map(item => {
                const emoji = item.type === 'break' ? '☕' : item.type === 'deep-work' ? '🎯' : '📖';
                const className = item.type === 'break' ? 'break' : item.type === 'deep-work' ? 'deep-work' : '';
                return `
                    <div class="schedule-item ${className}">
                        <div class="time">${item.time}</div>
                        <div class="subject">${emoji} ${item.subject} (${item.duration} min)</div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('schedule').innerHTML = scheduleHtml;
        }

        // Set default date to 30 days from now
        const defaultDate = new Date();
        defaultDate.setDate(defaultDate.getDate() + 30);
        document.getElementById('examDate').value = defaultDate.toISOString().split('T')[0];
    </script>
</body>
</html>
